name: true_time
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0
  intl: ^0.19.0
  provider: ^6.0.0
  wakelock_plus: ^1.1.0

dev_dependencies:
